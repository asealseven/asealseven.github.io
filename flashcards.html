<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ease: cubic-bezier(0.23, 1, 0.32, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f0f0f;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---- HEADER ---- */
  .app-header {
    padding: 2rem 2rem 1rem;
    text-align: center;
  }
  .app-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    letter-spacing: 0.12em;
    color: #fff;
    line-height: 1;
  }
  .app-subtitle {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    color: #666;
    text-transform: uppercase;
    margin-top: 0.4rem;
  }

  /* ---- LANGUAGE SELECTOR ---- */
  .lang-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    padding: 1.2rem 2rem;
    flex-wrap: wrap;
  }
  .lang-bar label {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: #555;
    text-transform: uppercase;
  }
  .lang-select {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  .lang-select:hover { border-color: #666; }

  /* ---- CATEGORY TABS ---- */
  .cat-nav {
    display: flex;
    overflow-x: auto;
    gap: 0.5rem;
    padding: 1rem 2rem;
    scrollbar-width: none;
    justify-content: center;
    flex-wrap: wrap;
  }
  .cat-nav::-webkit-scrollbar { display: none; }

  .cat-tab {
    padding: 0.45rem 1.1rem;
    border-radius: 100px;
    border: 1px solid transparent;
    font-size: 0.78rem;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.08em;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s var(--ease);
    background: #1a1a1a;
    color: #888;
    border-color: #2a2a2a;
  }
  .cat-tab:hover { color: #ccc; border-color: #444; }
  .cat-tab.active {
    color: #fff;
    font-weight: 700;
  }

  /* Category accent colors for tabs */
  .cat-tab.active[data-cat="basic"]       { background: #1a2535; border-color: #3b7dd8; color: #7ab3f0; }
  .cat-tab.active[data-cat="numbers"]     { background: #251a35; border-color: #8b3bd8; color: #c07af0; }
  .cat-tab.active[data-cat="people"]      { background: #351a1a; border-color: #d83b3b; color: #f07a7a; }
  .cat-tab.active[data-cat="time"]        { background: #1a3525; border-color: #3bd88b; color: #7af0b3; }
  .cat-tab.active[data-cat="directions"]  { background: #35251a; border-color: #d88b3b; color: #f0c07a; }
  .cat-tab.active[data-cat="food"]        { background: #1a3535; border-color: #3bd8d8; color: #7af0f0; }
  .cat-tab.active[data-cat="transport"]   { background: #252535; border-color: #6b6bd8; color: #a0a0f0; }
  .cat-tab.active[data-cat="emergencies"] { background: #351a25; border-color: #d83b8b; color: #f07ab3; }
  .cat-tab.active[data-cat="essential"]   { background: #2a2a1a; border-color: #d8c83b; color: #f0e07a; }
  .cat-tab.active[data-cat="phrases"]     { background: #1a1a2e; border-color: #7b5bd8; color: #c0a0f8; }

  /* ---- CARD GRID ---- */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.2rem;
    padding: 1.5rem 2rem 4rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ---- BASE FLASHCARD ---- */
  .flashcard {
    border-radius: 16px;
    padding: 1.6rem;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.25s var(--ease), box-shadow 0.25s var(--ease);
    min-height: 160px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    user-select: none;
  }
  .flashcard:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .flashcard:active { transform: scale(0.98); }

  .card-native {
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1.2;
  }
  .card-pronunciation {
    font-size: 0.78rem;
    letter-spacing: 0.05em;
    opacity: 0.65;
    margin-top: 0.3rem;
    font-style: italic;
  }
  .card-eng-pronunciation {
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    opacity: 0.4;
    margin-top: 0.15rem;
    font-family: 'DM Sans', sans-serif;
    font-style: normal;
  }
  .card-english {
    font-size: 0.82rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.55;
    margin-top: auto;
    padding-top: 1rem;
  }
  .card-decoration {
    position: absolute;
    pointer-events: none;
  }

  /* ==== CATEGORY THEMES ==== */

  /* BASIC COMMUNICATION: Deep navy, clean serif, grid lines */
  .theme-basic {
    background: linear-gradient(135deg, #0d1b2e 0%, #1a2f4a 100%);
    border: 1px solid rgba(59,125,216,0.3);
    font-family: 'Syne', sans-serif;
  }
  .theme-basic .card-native { color: #90c4ff; font-family: 'Syne', sans-serif; font-weight: 800; }
  .theme-basic .card-pronunciation { color: #5a9fd4; }
  .theme-basic .card-english { color: #4a7a9b; }
  .theme-basic::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 120px; height: 120px;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 18px,
      rgba(59,125,216,0.08) 18px, rgba(59,125,216,0.08) 19px
    ),
    repeating-linear-gradient(
      90deg, transparent, transparent 18px,
      rgba(59,125,216,0.08) 18px, rgba(59,125,216,0.08) 19px
    );
    border-radius: 0 16px 0 0;
  }
  .theme-basic .cat-label { color: #3b7dd8; }

  /* NUMBERS: Dark purple, monospace, geometric circles */
  .theme-numbers {
    background: linear-gradient(135deg, #120a1f 0%, #1e0f33 100%);
    border: 1px solid rgba(139,59,216,0.35);
    font-family: 'Space Mono', monospace;
  }
  .theme-numbers .card-native { color: #d0a0ff; font-family: 'Space Mono', monospace; font-size: 2rem; }
  .theme-numbers .card-pronunciation { color: #9966cc; font-family: 'Space Mono', monospace; }
  .theme-numbers .card-english { color: #6633aa; font-family: 'Space Mono', monospace; font-size: 0.72rem; }
  .theme-numbers::after {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    border-radius: 50%;
    border: 1px solid rgba(139,59,216,0.2);
    box-shadow: 0 0 0 25px rgba(139,59,216,0.05), 0 0 0 50px rgba(139,59,216,0.03);
  }

  /* PEOPLE & PRONOUNS: Deep crimson, editorial, torn texture feel */
  .theme-people {
    background: linear-gradient(135deg, #1e0808 0%, #2d0f0f 100%);
    border: 1px solid rgba(216,59,59,0.3);
    font-family: 'Crimson Pro', serif;
  }
  .theme-people .card-native { color: #ff9090; font-family: 'Playfair Display', serif; font-size: 1.9rem; font-weight: 900; }
  .theme-people .card-pronunciation { color: #cc6666; font-style: italic; }
  .theme-people .card-english { color: #884444; font-family: 'DM Sans', sans-serif; }
  .theme-people::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 3px;
    background: linear-gradient(90deg, #d83b3b, transparent);
  }

  /* TIME: Forest green, clean sans, clock motif */
  .theme-time {
    background: linear-gradient(135deg, #061910 0%, #0d2a1a 100%);
    border: 1px solid rgba(59,216,139,0.3);
    font-family: 'Syne', sans-serif;
  }
  .theme-time .card-native { color: #80ffb8; font-family: 'Syne', sans-serif; font-weight: 800; }
  .theme-time .card-pronunciation { color: #4daa77; }
  .theme-time .card-english { color: #2d6644; }
  .theme-time::after {
    content: '';
    position: absolute;
    top: -20px; right: -20px;
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 1px solid rgba(59,216,139,0.15);
  }
  .theme-time .clock-tick {
    position: absolute;
    top: 6px; right: 28px;
    width: 1px; height: 8px;
    background: rgba(59,216,139,0.3);
  }
  .theme-time .clock-tick2 {
    position: absolute;
    top: 28px; right: 6px;
    width: 8px; height: 1px;
    background: rgba(59,216,139,0.3);
  }

  /* DIRECTIONS: Warm amber, bold condensed, compass motif */
  .theme-directions {
    background: linear-gradient(135deg, #1f0e00 0%, #2e1600 100%);
    border: 1px solid rgba(216,139,59,0.3);
    font-family: 'Bebas Neue', sans-serif;
  }
  .theme-directions .card-native { color: #ffcc80; font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 0.05em; }
  .theme-directions .card-pronunciation { color: #c8882a; font-family: 'DM Sans', sans-serif; font-style: italic; }
  .theme-directions .card-english { color: #7a4a15; font-family: 'DM Sans', sans-serif; }
  .theme-directions::before {
    content: 'N';
    position: absolute;
    top: 12px; right: 18px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: rgba(216,139,59,0.15);
    letter-spacing: 0;
  }

  /* FOOD & DRINK: Teal, organic, warm feel */
  .theme-food {
    background: linear-gradient(135deg, #001f1f 0%, #002e2e 100%);
    border: 1px solid rgba(59,216,216,0.3);
    font-family: 'Crimson Pro', serif;
  }
  .theme-food .card-native { color: #80ffff; font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.8rem; }
  .theme-food .card-pronunciation { color: #3daaaa; }
  .theme-food .card-english { color: #226666; font-family: 'DM Sans', sans-serif; }
  .theme-food::after {
    content: '';
    position: absolute;
    bottom: -15px; right: -15px;
    width: 90px; height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,216,216,0.06) 0%, transparent 70%);
  }

  /* TRANSPORT: Slate blue, technical, clean lines */
  .theme-transport {
    background: linear-gradient(135deg, #0d0d22 0%, #141433 100%);
    border: 1px solid rgba(107,107,216,0.35);
    font-family: 'Space Mono', monospace;
  }
  .theme-transport .card-native { color: #b0b0ff; font-family: 'Space Mono', monospace; }
  .theme-transport .card-pronunciation { color: #6868aa; font-family: 'Space Mono', monospace; }
  .theme-transport .card-english { color: #404080; font-family: 'Space Mono', monospace; font-size: 0.72rem; }
  .theme-transport::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(107,107,216,0.6), transparent);
  }

  /* EMERGENCIES: High contrast red-pink, urgent, bold */
  .theme-emergencies {
    background: linear-gradient(135deg, #1f0010 0%, #2e0018 100%);
    border: 1px solid rgba(216,59,139,0.4);
    font-family: 'Syne', sans-serif;
  }
  .theme-emergencies .card-native { color: #ff80c0; font-family: 'Syne', sans-serif; font-weight: 800; }
  .theme-emergencies .card-pronunciation { color: #cc4488; }
  .theme-emergencies .card-english { color: #882255; }
  .theme-emergencies::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 4px; height: 100%;
    background: linear-gradient(180deg, #d83b8b, transparent);
    border-radius: 0 16px 16px 0;
  }

  /* ESSENTIAL PHRASES: Gold/amber, editorial, premium */
  .theme-essential {
    background: linear-gradient(135deg, #1a1500 0%, #262000 100%);
    border: 1px solid rgba(216,200,59,0.3);
    font-family: 'Playfair Display', serif;
  }
  .theme-essential .card-native { color: #ffe880; font-family: 'Playfair Display', serif; font-weight: 700; }
  .theme-essential .card-pronunciation { color: #aa9930; }
  .theme-essential .card-english { color: #665500; font-family: 'DM Sans', sans-serif; }
  .theme-essential::after {
    content: '"';
    position: absolute;
    top: -10px; left: 12px;
    font-family: 'Playfair Display', serif;
    font-size: 6rem;
    color: rgba(216,200,59,0.06);
    line-height: 1;
  }

  /* HANDY PHRASES: Deep indigo, conversational, speech bubble feel */
  .theme-phrases {
    background: linear-gradient(135deg, #0e0a22 0%, #1a1240 100%);
    border: 1px solid rgba(123,91,216,0.35);
    font-family: 'Syne', sans-serif;
  }
  .theme-phrases .card-native { color: #c8a8ff; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.35rem; line-height: 1.3; }
  .theme-phrases .card-pronunciation { color: #7b5bd8; }
  .theme-phrases .card-english { color: #4a3380; font-family: 'DM Sans', sans-serif; }
  .theme-phrases::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 90% 10%, rgba(123,91,216,0.08) 0%, transparent 60%);
    pointer-events: none;
  }

  /* ---- CATEGORY LABEL ---- */
  .cat-label {
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 0.8rem;
    font-family: 'DM Sans', sans-serif;
  }

  /* ---- FLIP OVERLAY (pronunciation pop) ---- */
  .card-details {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    padding: 2rem;
  }
  .card-details.open {
    opacity: 1;
    pointer-events: all;
  }
  .detail-card {
    max-width: 420px;
    width: 100%;
    border-radius: 20px;
    padding: 2.5rem;
    text-align: center;
    transform: scale(0.9);
    transition: transform 0.3s var(--ease);
  }
  .card-details.open .detail-card {
    transform: scale(1);
  }
  .detail-english-small {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.5;
    margin-bottom: 1rem;
  }
  .detail-native {
    font-size: 2.8rem;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 0.8rem;
  }
  .detail-pronunciation {
    font-size: 1.1rem;
    opacity: 0.7;
    font-style: italic;
    margin-bottom: 1.5rem;
  }
  .detail-english {
    font-size: 1.4rem;
    opacity: 0.9;
    font-weight: 600;
  }
  .detail-close {
    margin-top: 2rem;
    padding: 0.6rem 2rem;
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.2);
    background: transparent;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }
  .detail-close:hover { background: rgba(255,255,255,0.1); }

  /* ---- PROGRESS STRIP ---- */
  .progress-bar-wrap {
    padding: 0 2rem 0.5rem;
    max-width: 1400px;
    margin: 0 auto;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    color: #444;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .progress-track {
    height: 2px;
    background: #222;
    border-radius: 1px;
  }
  .progress-fill {
    height: 100%;
    border-radius: 1px;
    background: #fff;
    transition: width 0.4s var(--ease);
  }

  /* ---- EMPTY STATE ---- */
  .empty {
    text-align: center;
    padding: 4rem 2rem;
    color: #333;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
  }

  /* ---- SCROLL TO TOP ---- */
  .scroll-top {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #1a1a1a;
    border: 1px solid #333;
    color: #fff;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    opacity: 0;
    pointer-events: none;
  }
  .scroll-top.visible { opacity: 1; pointer-events: all; }
  .scroll-top:hover { background: #2a2a2a; transform: translateY(-2px); }
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title">Language Flashcards</div>
  <div class="app-subtitle">Tap any card for detail view</div>
</header>

<div class="lang-bar">
  <label>Target Language</label>
  <select class="lang-select" id="langSelect">
    <option value="spanish">Spanish</option>
    <option value="french">French</option>
    <option value="german">German</option>
    <option value="italian">Italian</option>
    <option value="portuguese">Portuguese</option>
    <option value="japanese">Japanese</option>
    <option value="mandarin">Mandarin</option>
    <option value="arabic">Arabic</option>
    <option value="greek">Greek</option>
    <option value="polish">Polish</option>
    <option value="thai">Thai</option>
    <option value="vietnamese">Vietnamese</option>
  </select>
</div>

<nav class="cat-nav" id="catNav"></nav>

<div class="progress-bar-wrap">
  <div class="progress-info">
    <span id="progressLabel">0 cards</span>
    <span id="catName">All</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<div class="card-grid" id="cardGrid"></div>

<div class="card-details" id="detailOverlay">
  <div class="detail-card" id="detailCard">
    <div class="detail-english-small" id="detailCat"></div>
    <div class="detail-native" id="detailNative"></div>
    <div class="detail-pronunciation" id="detailPronunciation"></div>
    <div id="detailEngPron" style="font-size:0.8rem;opacity:0.45;margin-bottom:0.8rem;font-family:'DM Sans',sans-serif;"></div>
    <div class="detail-english" id="detailEnglish"></div>
    <button class="detail-close" onclick="closeDetail()">Close</button>
  </div>
</div>

<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
// ============================================================
// LANGUAGE DATA TEMPLATE
// To add a new language, add an entry to LANGUAGES below.
// Each phrase entry: { en, native, pronunciation }
// ============================================================

const LANGUAGES = {
  spanish: {
    name: "Spanish",
    categories: {
      basic: [
        { en: "Hello / Hi", native: "Hola", pronunciation: "OH-lah" },
        { en: "Goodbye", native: "Adiós", pronunciation: "ah-dee-OHS" },
        { en: "Please", native: "Por favor", pronunciation: "por fah-VOR" },
        { en: "Thank you", native: "Gracias", pronunciation: "GRAH-see-as" },
        { en: "Sorry / Excuse me", native: "Lo siento / Perdón", pronunciation: "loh SYEN-toh / per-DON" },
        { en: "Yes", native: "Sí", pronunciation: "see" },
        { en: "No", native: "No", pronunciation: "noh" },
        { en: "I don't understand", native: "No entiendo", pronunciation: "noh en-TYEN-doh" },
        { en: "Do you speak English?", native: "¿Habla inglés?", pronunciation: "AH-blah een-GLAYS" },
        { en: "Help", native: "Ayuda", pronunciation: "ah-YOO-dah" },
      ],
      numbers: [
        { en: "1", native: "Uno", pronunciation: "OO-noh" },
        { en: "2", native: "Dos", pronunciation: "dohs" },
        { en: "3", native: "Tres", pronunciation: "trehs" },
        { en: "4", native: "Cuatro", pronunciation: "KWAH-troh" },
        { en: "5", native: "Cinco", pronunciation: "SEEN-koh" },
        { en: "6", native: "Seis", pronunciation: "says" },
        { en: "7", native: "Siete", pronunciation: "SYEH-teh" },
        { en: "8", native: "Ocho", pronunciation: "OH-choh" },
        { en: "9", native: "Nueve", pronunciation: "NWEH-veh" },
        { en: "10", native: "Diez", pronunciation: "dyehs" },
        { en: "11", native: "Once", pronunciation: "ON-seh" },
        { en: "12", native: "Doce", pronunciation: "DOH-seh" },
        { en: "13", native: "Trece", pronunciation: "TREH-seh" },
        { en: "14", native: "Catorce", pronunciation: "kah-TOR-seh" },
        { en: "15", native: "Quince", pronunciation: "KEEN-seh" },
        { en: "16", native: "Dieciséis", pronunciation: "dyeh-see-SAYS" },

        { en: "My name is…", native: "Tên tôi là…", pronunciation: "Ten toy la…", engPronunciation: "ten toy LAH" },

        { en: "Can you repeat that?", native: "Bạn có thể nhắc lại không?", pronunciation: "Ban co the nhac lai khong", engPronunciation: "ban gaw tay nyak LYE kawm" },

        { en: "Can you write it down?", native: "Bạn có thể viết ra không?", pronunciation: "Ban co the viet ra khong", engPronunciation: "ban gaw tay VEE-et rah kawm" },
        { en: "What does this mean?", native: "Cái này có nghĩa là gì?", pronunciation: "Kai nay co nghia la gi", engPronunciation: "kai NAY gaw NYAH lah zee" },
        { en: "Is there someone who speaks English?", native: "Có ai nói được tiếng Anh không?", pronunciation: "Co ai noi duoc tieng Anh khong", engPronunciation: "gaw eye noy doo-uk TYANG anh kawm" },
        { en: "I understand a little", native: "Tôi hiểu một chút", pronunciation: "Toy hieu mot chut", engPronunciation: "toy HYOO mote choot" },
        { en: "Can you help me?", native: "Bạn có thể giúp tôi không?", pronunciation: "Ban co the giup toy khong", engPronunciation: "ban gaw tay ZYOOP toy kawm" },
        { en: "Where can I find…?", native: "Tôi có thể tìm…ở đâu?", pronunciation: "Toy co the tim…o dau", engPronunciation: "toy gaw tay tim…uh DOW" },
        { en: "I have a reservation", native: "Tôi có đặt trước", pronunciation: "Toy co dat truoc", engPronunciation: "toy gaw dat TROO-uk" },
        { en: "Is Wi-Fi available?", native: "Có Wi-Fi không?", pronunciation: "Co wai-fai khong", engPronunciation: "gaw why-FAI kawm" },
        { en: "Can I have the menu?", native: "Cho tôi xem thực đơn", pronunciation: "Cho toy sem thuc don", engPronunciation: "chaw toy sem took DON" },

// ---- CATEGORY METADATA ----
const CAT_META = {
  basic:       { label: "Basic Communication", theme: "basic" },
  numbers:     { label: "Numbers",             theme: "numbers" },
  people:      { label: "People & Pronouns",   theme: "people" },
  time:        { label: "Time",                theme: "time" },
  directions:  { label: "Directions & Places", theme: "directions" },
  food:        { label: "Food & Drink",        theme: "food" },
  transport:   { label: "Transport",           theme: "transport" },
  emergencies: { label: "Emergencies",         theme: "emergencies" },
  essential:   { label: "Essential Phrases",   theme: "essential" },
  phrases:     { label: "Handy Phrases",       theme: "phrases" },
};

// ---- STATE ----
let currentLang = 'spanish';
let currentCat  = 'all';
let openCard    = null;

// ---- BUILD TABS ----
function buildTabs() {
  const nav = document.getElementById('catNav');
  nav.innerHTML = '';

  const allTab = document.createElement('button');
  allTab.className = 'cat-tab' + (currentCat === 'all' ? ' active' : '');
  allTab.dataset.cat = 'all';
  allTab.textContent = 'All';
  allTab.onclick = () => selectCat('all');
  nav.appendChild(allTab);

  const langData = LANGUAGES[currentLang];
  Object.entries(CAT_META).forEach(([key, meta]) => {
    if (!langData.categories[key]) return;
    const btn = document.createElement('button');
    btn.className = 'cat-tab' + (currentCat === key ? ' active' : '');
    btn.dataset.cat = key;
    btn.textContent = meta.label;
    btn.onclick = () => selectCat(key);
    nav.appendChild(btn);
  });
}

// ---- BUILD CARDS ----
function buildCards() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';

  const langData = LANGUAGES[currentLang];
  let cards = [];

  if (currentCat === 'all') {
    Object.entries(langData.categories).forEach(([catKey, phrases]) => {
      phrases.forEach(p => cards.push({ ...p, catKey }));
    });
  } else {
    (langData.categories[currentCat] || []).forEach(p => {
      cards.push({ ...p, catKey: currentCat });
    });
  }

  cards.forEach((card, i) => {
    const meta  = CAT_META[card.catKey];
    const el    = document.createElement('div');
    el.className = `flashcard theme-${meta.theme}`;
    el.style.animationDelay = `${i * 0.03}s`;
    el.innerHTML = `
      <div class="cat-label">${meta.label}</div>
      <div class="card-native">${card.native}</div>
      <div class="card-pronunciation">${card.pronunciation || ''}</div>
      ${card.engPronunciation ? `<div class="card-eng-pronunciation">EN: ${card.engPronunciation}</div>` : ''}
      <div class="card-english">${card.en}</div>
    `;
    el.onclick = () => openDetail(card, meta);
    grid.appendChild(el);
  });

  // Update progress
  const fill  = document.getElementById('progressFill');
  const label = document.getElementById('progressLabel');
  const cname = document.getElementById('catName');
  label.textContent = `${cards.length} card${cards.length !== 1 ? 's' : ''}`;
  cname.textContent = currentCat === 'all' ? 'All Categories' : CAT_META[currentCat]?.label || '';
  fill.style.width = '100%';
}

// ---- DETAIL OVERLAY ----
function openDetail(card, meta) {
  const overlay = document.getElementById('detailOverlay');
  const dc      = document.getElementById('detailCard');

  document.getElementById('detailCat').textContent = meta.label;
  document.getElementById('detailNative').textContent = card.native;
  document.getElementById('detailPronunciation').textContent = card.pronunciation || '';
  const engPronEl = document.getElementById('detailEngPron');
  engPronEl.textContent = card.engPronunciation ? 'EN: ' + card.engPronunciation : '';
  document.getElementById('detailEnglish').textContent = card.en;

  // Style detail card to match theme
  const themes = {
    basic:       { bg: '#0d1b2e', border: 'rgba(59,125,216,0.5)', color: '#90c4ff', font: "'Syne', sans-serif" },
    numbers:     { bg: '#120a1f', border: 'rgba(139,59,216,0.5)', color: '#d0a0ff', font: "'Space Mono', monospace" },
    people:      { bg: '#1e0808', border: 'rgba(216,59,59,0.5)',   color: '#ff9090', font: "'Playfair Display', serif" },
    time:        { bg: '#061910', border: 'rgba(59,216,139,0.5)', color: '#80ffb8', font: "'Syne', sans-serif" },
    directions:  { bg: '#1f0e00', border: 'rgba(216,139,59,0.5)', color: '#ffcc80', font: "'Bebas Neue', sans-serif" },
    food:        { bg: '#001f1f', border: 'rgba(59,216,216,0.5)', color: '#80ffff', font: "'Playfair Display', serif" },
    transport:   { bg: '#0d0d22', border: 'rgba(107,107,216,0.5)', color: '#b0b0ff', font: "'Space Mono', monospace" },
    emergencies: { bg: '#1f0010', border: 'rgba(216,59,139,0.5)', color: '#ff80c0', font: "'Syne', sans-serif" },
    essential:   { bg: '#1a1500', border: 'rgba(216,200,59,0.5)', color: '#ffe880', font: "'Playfair Display', serif" },
    phrases:     { bg: '#0e0a22', border: 'rgba(123,91,216,0.5)', color: '#c8a8ff', font: "'Syne', sans-serif" },
  };
  const t = themes[meta.theme] || themes.basic;
  dc.style.background   = t.bg;
  dc.style.border       = `1px solid ${t.border}`;
  dc.style.color        = '#fff';
  document.getElementById('detailNative').style.color      = t.color;
  document.getElementById('detailNative').style.fontFamily = t.font;

  overlay.classList.add('open');
  openCard = card;

  overlay.onclick = (e) => { if (e.target === overlay) closeDetail(); };
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  openCard = null;
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeDetail();
});

// ---- CATEGORY SELECT ----
function selectCat(cat) {
  currentCat = cat;
  buildTabs();
  buildCards();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ---- LANGUAGE SELECT ----
document.getElementById('langSelect').addEventListener('change', (e) => {
  currentLang = e.target.value;
  currentCat  = 'all';
  buildTabs();
  buildCards();
});

// ---- SCROLL TOP ----
window.addEventListener('scroll', () => {
  const btn = document.getElementById('scrollTop');
  btn.classList.toggle('visible', window.scrollY > 300);
});

// ---- INIT ----
buildTabs();
buildCards();
</script>
</body>
</html>
